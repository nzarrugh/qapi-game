<!DOCTYPE html>

  #what-link { margin-top: 10px; }

    text-decoration: none;
    cursor: pointer;
    pointer-events: auto;
    letter-spacing: 1px;
    transition: background 0.15s;
  }
  #go-cta-btn:hover { background: #5a1008; }

<video id="go-video" src="assets/Sequence 01.mp4" loop muted playsinline preload="auto" style="display:none"></video>

<script>
"use strict";
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 480, H = 640;
C.width = W; C.height = H;

function resize() {
  const sc = Math.min(window.innerWidth / W, (window.innerHeight - 40) / H, 1.5);
  C.style.width = Math.floor(W * sc) + 'px';
  C.style.height = Math.floor(H * sc) + 'px';
  document.getElementById('game-wrap').style.setProperty('--sc', sc);
}
resize();
window.addEventListener('resize', resize);

// ── Palette ───────────────────────────────────────────────────────────────────
const P = {
  bg: '#0c0906', bgFloor: '#160b04', lamp: '#f0d060',
  pPaper: '#c8b870', pDk: '#a09050', pLine: '#6a5030', pAngry: '#cc3322',
  rMetal: '#7a8898', rMid: '#a0aec0', rLt: '#c8d4e4', rDk: '#18202e',
  rScreen: '#080c1a', rScrTxt: '#00ee88', rEye: '#ff2200', rEyeLt: '#ff8866',
  rBolt: '#d0d8e8', rAnt: '#ff2200',
  bullet: '#ee2211', bulletGlow: 'rgba(220,40,20,0.4)',
  plat: '#6b3e18', platLt: '#9a6030', platDk: '#3a1e08',
  platGrain: '#4a2a0c', deskSurf: '#1a0e06',
  uiText: '#e8d8a8', uiDim: '#6a5a3a', uiRed: '#dd3322', uiGold: '#ffcc22',
  burnLow: '#44aa44', burnMid: '#ddaa22', burnHi: '#cc3322',
};

const PLAT_SEGS = 12, PLAT_Y = H - 10, PLAT_H = 18, SEG_W = W / PLAT_SEGS;
const PHALF = 44;

// ── Image assets ──────────────────────────────────────────────────────────────
const imgs = {};
const imgReady = {};  // processed offscreen canvases (white bg removed)
let assetsLoaded = 0;
const ASSET_TOTAL = 6;

// Remove white background by zeroing alpha on near-white pixels
function processWhiteBg(img) {
  try {
    const oc = document.createElement('canvas');
    oc.width = img.naturalWidth; oc.height = img.naturalHeight;
    const oc2 = oc.getContext('2d');
    oc2.drawImage(img, 0, 0);
    const d = oc2.getImageData(0, 0, oc.width, oc.height);
    const px = d.data;
    for (let i = 0; i < px.length; i += 4) {
      if (px[i] > 220 && px[i+1] > 220 && px[i+2] > 220) px[i+3] = 0;
    }
    oc2.putImageData(d, 0, 0);
    return oc;
  } catch(e) {
    return null;
  }
}

function loadImg(key, src, removeWhite) {
  // Try DOM-embedded asset first (works under file://)
  const domEl = document.getElementById('asset-' + key);
  if (domEl) {
    imgs[key] = domEl;
    if (removeWhite) {
      // process after a short delay to ensure the element is painted
      setTimeout(() => {
        const oc = processWhiteBg(domEl);
        if (oc) imgReady[key] = oc;
        assetsLoaded++;
      }, 0);
    } else {
      assetsLoaded++;
    }
    return;
  }
  const img = new Image();
  img.onload = () => {
    assetsLoaded++;
    if (removeWhite) {
      const oc = processWhiteBg(img);
      if (oc) imgReady[key] = oc;
    }
  };
  img.onerror = () => { assetsLoaded++; };
  img.src = src;
  imgs[key] = img;
}

loadImg('player',     'assets/player.png',      true);
loadImg('playerIdle', 'assets/player-idle.png',  true);
loadImg('boss',       'assets/boss.png',          false);
loadImg('lamp',       'assets/lamp.png',          false);
loadImg('papers',     'assets/papers.png',        true);
loadImg('burnout',    'assets/burnout.png',        false);
loadImg('title',      'assets/title.png',           false);

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if      (e.code === 'Enter' && gs && gs.phase === 'gameover') goToTitle();
  else if (e.code === 'Enter' && gs && gs.phase === 'title')    startGame();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── State ─────────────────────────────────────────────────────────────────────
let gs, player, bullets, enemies, particles, platform;

const makeGs = () => ({ phase:'title', frame:0, score:0, burnout:0, wave:1, speedMult:1, fallerTimer:0, fallerRate:80, goReason:'' });
const makePlayer = () => ({ x:W/2, y:PLAT_Y - PHALF, speed:3.8, shootCD:0, shootRate:16, firing:false });

function resetGame() {
  gs = makeGs(); gs.phase = 'playing';
  player = makePlayer();
  bullets = []; enemies = []; particles = [];
  platform = Array(PLAT_SEGS).fill(true);
  goCta.style.display = 'none';
  for (let i=0;i<5;i++) spawnFaller();
}
function startGame() { resetGame(); }
function goToTitle() {
  gs = makeGs();
  goCta.style.display = 'none';
  goVideo.pause();
}

// ── Spawning ──────────────────────────────────────────────────────────────────
function spawnFormation() {
  for (let r = 0; r < 2; r++)
    for (let c = 0; c < 6; c++)
      enemies.push({ x:54+c*60, y:52+r*44, w:26, h:24, col:c, row:r,
        type: r===0 ? 'bot' : 'clipboard',
        faller:false, diving:false, diveSpeedY:2.4+Math.random()*1.6,
        phase:c*0.45+r*0.9, baseX:54+c*60, baseY:52+r*44, dead:false, hitFlash:0 });
}
function spawnFaller() {
  const bonus = (gs.burnout/100)*2.5, _r=Math.random(), type=_r<0.4?'paper':_r<0.7?'clipboard':'bot';
  const fw=type==='clipboard'?20:type==='bot'?24:22, fh=type==='clipboard'?32:type==='bot'?22:24;
  enemies.push({ x:30+Math.random()*(W-60), y:-fh, w:fw, h:fh, type,
    faller:true, diving:false, diveSpeedY:2.0+Math.random()*1.2+bonus,
    wobbleV:(Math.random()-0.5)*0.6, phase:Math.random()*Math.PI*2, dead:false, hitFlash:0 });
}

// ── Platform ──────────────────────────────────────────────────────────────────
function chipPlatform() {
  const ok = platform.map((v,i)=>v?i:-1).filter(i=>i>=0);
  if (!ok.length) { triggerGO('FLOOR COLLAPSED'); return; }
  platform[ok[Math.floor(Math.random()*ok.length)]] = false;
  gs.burnout = Math.min(100, gs.burnout + 10);
  if (ok.length === 1) triggerGO('FLOOR DESTROYED');
}
const goVideo = document.getElementById('go-video');
const goCta = document.getElementById('go-cta');
function triggerGO(r) {
  gs.phase = 'gameover'; gs.goReason = r||'AUDIT TRIGGERED';
  goVideo.currentTime = 0;
  goVideo.play().catch(()=>{});
  goCta.style.display = 'block';
}

// ── Particles ─────────────────────────────────────────────────────────────────
function burst(x, y, color, n=7) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1.5,size:2+Math.random()*2.5,color,life:30+Math.random()*20,maxLife:50});
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  if (gs.phase !== 'playing') return;
  gs.frame++;
  gs.burnout = Math.min(100, gs.burnout + 0.022*(1+gs.wave*0.15));
  gs.speedMult = 1 + (gs.burnout/100)*2.4;

  const movL = keys['ArrowLeft']||keys['KeyA'];
  const movR = keys['ArrowRight']||keys['KeyD'];
  const shoot = keys['Space']||keys['ArrowUp']||keys['KeyW'];
  if (movL) player.x = Math.max(24, player.x - player.speed);
  if (movR) player.x = Math.min(W-24, player.x + player.speed);
  player.firing = shoot && player.shootCD === 0;
  if (player.shootCD > 0) player.shootCD--;
  if (shoot && player.shootCD === 0) {
    bullets.push({x:player.x, y:player.y-PHALF, vy:9, dead:false});
    player.shootCD = player.shootRate;
  }

  gs.fallerTimer++;
  const fr = Math.max(22, gs.fallerRate - gs.wave*10 - Math.floor(gs.burnout*0.4));
  if (gs.fallerTimer >= fr) {
    gs.fallerTimer = 0; spawnFaller();
    if (gs.burnout > 40) spawnFaller();
    if (gs.burnout > 75) spawnFaller();
  }
  if (gs.frame>0 && gs.frame%1400===0) { gs.wave++; gs.fallerRate=Math.max(20,80-gs.wave*8); }

  const drift = Math.sin(gs.frame*0.012)*(32+gs.wave*4);
  const descend = gs.wave*6;
  for (const e of enemies) {
    if (e.dead) continue;
    if (e.faller) {
      e.y += e.diveSpeedY*gs.speedMult; e.x += e.wobbleV;
      e.x = Math.max(12,Math.min(W-12,e.x));
      if (Math.abs(e.x-12)<2||Math.abs(e.x-(W-12))<2) e.wobbleV*=-1;
      if (e.y > PLAT_Y) { e.dead=true; chipPlatform(); burst(e.x,PLAT_Y,P.pPaper,6); }
    } else {
      if (!e.diving) {
        e.x = e.baseX+drift;
        e.y = e.baseY+descend+Math.sin(gs.frame*0.025+e.phase)*6;
        if (Math.random()<0.0018*gs.speedMult) e.diving=true;
      } else {
        e.y += e.diveSpeedY*gs.speedMult;
        if (e.y > PLAT_Y) { e.dead=true; chipPlatform(); burst(e.x,PLAT_Y,P.rLt,6); }
      }
    }
    if (e.hitFlash>0) e.hitFlash--;
  }

  for (const b of bullets) {
    if (b.dead) continue;
    b.y -= b.vy;
    if (b.y < -10) { b.dead=true; continue; }
    for (const e of enemies) {
      if (e.dead) continue;
      if (Math.abs(b.x-e.x)<e.w/2+3 && Math.abs(b.y-e.y)<e.h/2+4) {
        b.dead=true; e.dead=true;
        gs.score += e.faller?150:100;
        gs.burnout = Math.max(0,gs.burnout-4);
        burst(e.x,e.y,e.type==='bot'?P.rLt:P.pPaper,9); break;
      }
    }
  }
  for (let i=bullets.length-1;i>=0;i--)   if (bullets[i].dead)   bullets.splice(i,1);
  for (let i=enemies.length-1;i>=0;i--)   if (enemies[i].dead)   enemies.splice(i,1);
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.14; p.life--;
    if (p.life<=0) particles.splice(i,1);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════════════════════════════════════════
const rr = x => Math.round(x);

// Draw sprite with white-bg-removed offscreen canvas (or raw img fallback)
// Returns true if drawn from image asset, false if not available
function drawSprite(key, cx, bottomY, drawW, drawH, flipX=false) {
  const src = imgReady[key] || null;
  const raw = imgs[key];

  // prefer processed (white removed), otherwise try raw image
  const drawable = src || (raw && raw.complete && raw.naturalWidth > 0 ? raw : null);
  if (!drawable) return false;

  ctx.save();
  ctx.translate(rr(cx - drawW/2), rr(bottomY - drawH));
  if (flipX) { ctx.scale(-1,1); ctx.translate(-drawW, 0); }
  ctx.drawImage(drawable, 0, 0, drawW, drawH);
  ctx.restore();
  return true;
}

// Draw scene image with screen blend (for dark-background art: lamp, papers, boss)
function drawSceneImage(key, x, y, w, h, alpha=1) {
  const img = imgs[key];
  if (!img || !img.complete || img.naturalWidth === 0) return false;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.globalCompositeOperation = 'screen';
  ctx.drawImage(img, rr(x), rr(y), rr(w), rr(h));
  ctx.restore();
  return true;
}

// Draw the papers asset (white-bg removed) at given position
function drawPapers(x, y, w, h, flipX=false) {
  const src = imgReady['papers'] || imgs['papers'];
  if (!src || (src instanceof HTMLImageElement && (!src.complete || !src.naturalWidth))) {
    // fallback procedural stack
    drawStack(x + w/2, y + h, w * 0.8, h, 1);
    return;
  }
  ctx.save();
  if (flipX) {
    ctx.translate(rr(x + w), rr(y));
    ctx.scale(-1, 1);
    ctx.drawImage(src, 0, 0, rr(w), rr(h));
  } else {
    ctx.drawImage(src, rr(x), rr(y), rr(w), rr(h));
  }
  ctx.restore();
}

// ── Background ────────────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = P.bg; ctx.fillRect(0,0,W,H);
  const g = ctx.createRadialGradient(W/2,0,20,W/2,H*0.1,H*0.75);
  g.addColorStop(0,'rgba(240,200,60,0.12)');
  g.addColorStop(0.5,'rgba(240,190,50,0.04)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // ── Lamp ──
  const lamp = imgs['lamp'];
  if (lamp && lamp.complete && lamp.naturalWidth && lamp.naturalHeight) {
    const lw = 110, lh = Math.round(lw * lamp.naturalHeight / lamp.naturalWidth);
    drawSceneImage('lamp', W/2 - lw/2, 0, lw, lh);
  } else {
    ctx.fillStyle='#3a3a3a'; ctx.fillRect(rr(W/2)-14,0,28,6);
    ctx.fillStyle=P.lamp;
    ctx.beginPath();
    ctx.moveTo(rr(W/2)-26,6); ctx.lineTo(rr(W/2)+26,6);
    ctx.lineTo(rr(W/2)+14,24); ctx.lineTo(rr(W/2)-14,24);
    ctx.closePath(); ctx.fill();
  }

}

function drawForeground() {
  // D = bleed past canvas bottom; stack tops = H - height + D
  // PLAT_Y=550, SPR_H=194 => waist ~y=453; tops should be <=455 to hide legs
  const D = 150;
  drawPapers(-20,    H-300+D, 130, 300);
  drawPapers(90,     H-260+D, 100, 260);
  drawPapers(162,    H-235+D, 86,  235);
  drawPapers(232,    H-248+D, 74,  248);
  drawPapers(W/2-58, H-242+D, 116, 242);
  drawPapers(W-306,  H-248+D, 74,  248, true);
  drawPapers(W-248,  H-235+D, 86,  235, true);
  drawPapers(W-190,  H-260+D, 100, 260, true);
  drawPapers(W-110,  H-300+D, 130, 300, true);
}

function drawStack(cx, bottomY, w, h, alpha) {
  ctx.globalAlpha = alpha;
  const n = 9;
  for (let i=0;i<n;i++) {
    const sh=h/n, sy=bottomY-i*sh, ox=(i%3-1)*1.2;
    ctx.fillStyle=i%2===0?'#887848':'#6a5838';
    ctx.fillRect(rr(cx-w/2+ox),rr(sy-sh),rr(w),rr(sh+1));
  }
  ctx.globalAlpha=1;
}

// ── Platform ──────────────────────────────────────────────────────────────────
function drawPlatform() {
  for (let i=0;i<PLAT_SEGS;i++) {
    if (!platform[i]) continue;
    const x=i*SEG_W, y=PLAT_Y, sw=SEG_W-2;
    // desk surface
    ctx.fillStyle=P.plat;   ctx.fillRect(rr(x+1),rr(y),rr(sw),PLAT_H);
    // top highlight edge
    ctx.fillStyle=P.platLt; ctx.fillRect(rr(x+1),rr(y),rr(sw),2);
    // bottom shadow edge
    ctx.fillStyle=P.platDk; ctx.fillRect(rr(x+1),rr(y+PLAT_H-2),rr(sw),2);
    // wood grain lines
    ctx.fillStyle=P.platGrain;
    ctx.fillRect(rr(x+2),rr(y+4), rr(sw-4),1);
    ctx.fillRect(rr(x+2),rr(y+8), rr(sw-4),1);
    ctx.fillRect(rr(x+2),rr(y+12),rr(sw-4),1);
    // segment gap shadow
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.fillRect(rr(x),rr(y),1,PLAT_H);
  }
}

// ── Player ────────────────────────────────────────────────────────────────────
function drawPlayer(cx, bottomY, firing) {
  const SPR_W = 158, SPR_H = 194;
  const drawn = drawSprite('player', cx, bottomY, SPR_W, SPR_H);
  if (!drawn) {
    ctx.fillStyle = '#3e8a2c';
    ctx.beginPath(); ctx.arc(rr(cx), rr(bottomY-SPR_H/2), 28, 0, Math.PI*2); ctx.fill();
    // marker arm
    ctx.fillStyle = '#cc2200';
    ctx.fillRect(rr(cx)-3, rr(bottomY-SPR_H)-6, 6, 18);
  }
  if (firing) {
    ctx.fillStyle = 'rgba(255,220,40,0.6)';
    ctx.beginPath(); ctx.arc(rr(cx), rr(bottomY-SPR_H), 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,150,0.9)';
    ctx.beginPath(); ctx.arc(rr(cx), rr(bottomY-SPR_H), 4, 0, Math.PI*2); ctx.fill();
  }
  // Shadow gradient over lower body so legs blend into darkness
  const fadeY = rr(bottomY - SPR_H * 0.52);
  const legGrad = ctx.createLinearGradient(0, fadeY, 0, bottomY);
  legGrad.addColorStop(0, 'rgba(6,4,2,0)');
  legGrad.addColorStop(1, 'rgba(6,4,2,0.92)');
  ctx.fillStyle = legGrad;
  ctx.fillRect(rr(cx - SPR_W/2 - 2), fadeY, SPR_W + 4, bottomY - fadeY + 2);
}

// ── Bot enemy — hovering robot drone ──────────────────────────────────────────
function drawBot(x, y, w, h, t, flash) {
  const bob = Math.sin(t*0.09+x*0.03)*2.5;
  ctx.save();
  ctx.translate(rr(x), rr(y+bob));
  if (flash>0 && flash%4<2) ctx.globalAlpha=0.38;
  const hw=w/2, hh=h/2;

  // thruster glow beneath
  ctx.fillStyle='rgba(255,140,20,0.18)';
  ctx.beginPath(); ctx.ellipse(0,rr(hh+2),rr(hw-2),3,0,0,Math.PI*2); ctx.fill();

  // ── body (lower torso box) ──
  ctx.fillStyle=P.rDk;    ctx.fillRect(rr(-hw),   rr(1),  rr(w),   rr(hh));
  ctx.fillStyle=P.rMetal; ctx.fillRect(rr(-hw+2), rr(3),  rr(w-4), rr(hh-4));
  // vent slits
  ctx.fillStyle='rgba(0,0,0,0.5)';
  for (let i=0;i<3;i++) ctx.fillRect(rr(-hw+5),rr(6+i*4),rr(w-10),2);
  // body highlight
  ctx.fillStyle=P.rLt;    ctx.fillRect(rr(-hw+2), rr(3),  2, rr(hh-5));
  // body rivets
  ctx.fillStyle=P.rBolt;
  ctx.beginPath(); ctx.arc(rr(-hw+4),rr(4),1.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(rr(hw-4), rr(4),1.8,0,Math.PI*2); ctx.fill();

  // ── neck ──
  ctx.fillStyle=P.rMetal; ctx.fillRect(-3,rr(-hh+8),6,6);
  ctx.fillStyle=P.rLt;    ctx.fillRect(-2,rr(-hh+8),2,6);

  // ── head box ──
  ctx.fillStyle=P.rDk;    ctx.fillRect(rr(-hw+1), rr(-hh-5), rr(w-2), rr(hh+10));
  ctx.fillStyle=P.rMetal; ctx.fillRect(rr(-hw+3), rr(-hh-3), rr(w-6), rr(hh+8));
  // head top highlight
  ctx.fillStyle=P.rLt;    ctx.fillRect(rr(-hw+3), rr(-hh-3), rr(w-6), 2);
  // head side highlight
  ctx.fillStyle=P.rLt;    ctx.fillRect(rr(-hw+3), rr(-hh-3), 2, rr(hh+6));
  // head rivets
  ctx.fillStyle=P.rBolt;
  [[-hw+5,-hh],[hw-5,-hh],[-hw+5,-2],[hw-5,-2]].forEach(([rx,ry])=>{
    ctx.beginPath(); ctx.arc(rr(rx),rr(ry),1.5,0,Math.PI*2); ctx.fill();
  });

  // ── face screen (dark panel) ──
  const sx=rr(-hw+6), sy=rr(-hh+2), sw=rr(w-12), sh=rr(hh-1);
  ctx.fillStyle='#060402'; ctx.fillRect(sx,sy,sw,sh);
  ctx.strokeStyle='rgba(200,100,20,0.5)'; ctx.lineWidth=1;
  ctx.strokeRect(sx,sy,sw,sh);

  // scrolling error text on screen
  ctx.fillStyle='rgba(220,90,20,0.7)'; ctx.font='4px monospace'; ctx.textAlign='center';
  const sc=Math.floor(t/5)%8;
  const msgs=['ERR','!QA','VIO','404','BAD','ERR','!!!','---'];
  for (let i=0;i<3;i++) ctx.fillText(msgs[(sc+i)%8], 0, rr(sy+5+i*4.5));
  ctx.textAlign='left';

  // ── LED eyes ──
  const flicker=Math.sin(t*0.22+x)*Math.sin(t*0.31)>0.7?0.15:1;
  ctx.globalAlpha *= flicker;
  // eye sockets
  ctx.fillStyle='#0a0402';
  ctx.beginPath(); ctx.ellipse(rr(-hw*0.38),rr(-hh/2-1),5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(rr( hw*0.38),rr(-hh/2-1),5,4,0,0,Math.PI*2); ctx.fill();
  // glowing pupils
  ctx.fillStyle=P.rEye;
  ctx.beginPath(); ctx.ellipse(rr(-hw*0.38),rr(-hh/2-1),3.5,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(rr( hw*0.38),rr(-hh/2-1),3.5,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=P.rEyeLt;
  ctx.beginPath(); ctx.arc(rr(-hw*0.38),rr(-hh/2-1),1.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(rr( hw*0.38),rr(-hh/2-1),1.8,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=flash>0&&flash%4<2?0.38:1;

  // ── antenna ──
  ctx.fillStyle=P.rMetal; ctx.fillRect(-1,rr(-hh-13),2,10);
  const antFlash=(t%30<15);
  ctx.fillStyle=antFlash?'#ff4400':'#881100';
  ctx.beginPath(); ctx.arc(0,rr(-hh-14),2.5,0,Math.PI*2); ctx.fill();

  ctx.globalAlpha=1; ctx.restore();
}

// ── Paper enemy ───────────────────────────────────────────────────────────────
function drawPaper(x, y, w, h, t, flash) {
  ctx.save();
  ctx.translate(rr(x),rr(y));
  ctx.rotate(Math.sin(t*0.06+x*0.04)*0.18);
  if (flash>0&&flash%4<2) ctx.globalAlpha=0.38;
  const hw=w/2, hh=h/2;
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(rr(-hw+2),rr(-hh+2),rr(w),rr(h));
  ctx.fillStyle=P.pDk;    ctx.fillRect(rr(-hw),rr(-hh),rr(w),rr(h));
  ctx.fillStyle=P.pPaper; ctx.fillRect(rr(-hw),rr(-hh),rr(w-1),rr(h-1));
  ctx.fillStyle='rgba(100,78,28,0.25)'; ctx.fillRect(rr(-hw),rr(-hh),rr(w),6);
  ctx.fillStyle=P.pLine;
  for (let i=0;i<4;i++) ctx.fillRect(rr(-hw+3),rr(-hh+8+i*5),rr(w-6),1.5);
  ctx.fillStyle=P.pDk;
  ctx.beginPath(); ctx.moveTo(hw-7,-hh); ctx.lineTo(hw,-hh+7); ctx.lineTo(hw,-hh); ctx.closePath(); ctx.fill();
  ctx.fillStyle=P.pAngry;
  ctx.fillRect(-5,0,3,3); ctx.fillRect(3,0,3,3);
  ctx.strokeStyle=P.pAngry; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(-6,-2); ctx.lineTo(-2,-1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,-2); ctx.lineTo(2,-1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-5,6); ctx.lineTo(-2,4); ctx.lineTo(0,6); ctx.lineTo(2,4); ctx.lineTo(5,6); ctx.stroke();
  ctx.globalAlpha=1; ctx.restore();
}

// ── Clipboard enemy ───────────────────────────────────────────────────────────
function drawClipboard(x, y, w, h, t, flash) {
  ctx.save();
  ctx.translate(rr(x), rr(y));
  ctx.rotate(Math.sin(t*0.05+x*0.04)*0.1);
  if (flash>0&&flash%4<2) ctx.globalAlpha=0.38;
  const hw=w/2, hh=h/2;
  const clipH = Math.max(6, Math.round(h*0.26));
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(rr(-hw+2),rr(-hh+2),w,h);
  // board body
  ctx.fillStyle='#1e1008'; ctx.fillRect(rr(-hw),rr(-hh),w,h);
  ctx.fillStyle='#2e1a0a'; ctx.fillRect(rr(-hw+1),rr(-hh+1),w-2,h-2);
  // paper area below clip
  ctx.fillStyle='#e2d8b4'; ctx.fillRect(rr(-hw+2),rr(-hh+clipH),w-4,h-clipH-2);
  // clip — full width, prominent silver-gray bar
  ctx.fillStyle='#4e5868'; ctx.fillRect(rr(-hw),rr(-hh),w,clipH+2);
  ctx.fillStyle='#b8c8da'; ctx.fillRect(rr(-hw+1),rr(-hh+1),w-2,2);  // top highlight
  ctx.fillStyle='#2e3848'; ctx.fillRect(rr(-hw),rr(-hh+clipH),w,3);   // bottom shadow
  // centre lever (raised press mechanism)
  ctx.fillStyle='#7888a0';
  ctx.fillRect(rr(-hw*0.45),rr(-hh),Math.round(w*0.45),clipH+1);
  ctx.fillStyle='#c8d8ec';
  ctx.fillRect(rr(-hw*0.45+1),rr(-hh+1),Math.round(w*0.45)-2,1);
  // ruled lines on paper
  ctx.fillStyle='rgba(100,80,28,0.45)';
  for (let i=0;i<4;i++) ctx.fillRect(rr(-hw+4),rr(-hh+clipH+4+i*5),w-8,1.2);
  // red X marks (violations)
  ctx.fillStyle='#cc1a00'; ctx.font='bold 4px monospace'; ctx.textAlign='center';
  ctx.fillText('X', rr(-hw*0.55), rr(-hh+clipH+8));
  ctx.fillText('X', rr(-hw*0.55), rr(-hh+clipH+18));
  ctx.globalAlpha=1; ctx.restore();
}

// ── Bullets ───────────────────────────────────────────────────────────────────
function drawBullets() {
  for (const b of bullets) {
    if (b.dead) continue;
    ctx.fillStyle=P.bulletGlow;
    ctx.beginPath(); ctx.arc(rr(b.x),rr(b.y),6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#881100'; ctx.fillRect(rr(b.x)-2,rr(b.y)-9,4,9);
    ctx.fillStyle=P.bullet;  ctx.fillRect(rr(b.x)-1.5,rr(b.y)-8,3,7);
    ctx.fillStyle='#ffaaaa'; ctx.fillRect(rr(b.x)-1,rr(b.y)-10,2,3);
  }
}

// ── UI ────────────────────────────────────────────────────────────────────────
function drawUI() {
  // Top bar background
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,38);
  ctx.fillStyle='rgba(255,200,80,0.08)'; ctx.fillRect(0,36,W,2);

  // Score
  ctx.fillStyle=P.uiDim; ctx.font='7px "Press Start 2P"'; ctx.textAlign='left';
  ctx.fillText('SCORE', 10, 13);
  ctx.fillStyle=P.uiGold; ctx.font='bold 10px "Press Start 2P"';
  ctx.fillText(String(gs.score).padStart(6,'0'), 10, 28);

  // Wave
  ctx.fillStyle=P.uiDim; ctx.font='7px "Press Start 2P"'; ctx.textAlign='right';
  ctx.fillText('WAVE', W-10, 13);
  ctx.fillStyle=P.uiText; ctx.font='bold 10px "Press Start 2P"';
  ctx.fillText(gs.wave, W-10, 28);

  // Burnout meter — centred
  const bx=W/2-80, bw=160, bh=14, frac=gs.burnout/100;
  const by=20;
  const barCol = frac<0.4?P.burnLow:frac<0.75?P.burnMid:P.burnHi;

  // "BURNOUT" label — large, bright, left of bar
  ctx.font='bold 8px "Press Start 2P"'; ctx.textAlign='right';
  ctx.fillStyle='#ffffff'; ctx.fillText('BURNOUT', bx-6, by+bh-1);

  // Bar trough
  ctx.fillStyle='#0a0806';
  ctx.fillRect(bx, by, bw, bh);
  // Bar fill
  ctx.fillStyle=barCol;
  ctx.fillRect(bx, by, Math.round(bw*frac), bh);
  // Flash at critical
  if (frac>0.85&&gs.frame%8<4) {
    ctx.fillStyle='rgba(255,60,10,0.5)';
    ctx.fillRect(bx, by, Math.round(bw*frac), bh);
  }
  // Border
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
  ctx.strokeRect(bx-0.5, by-0.5, bw+1, bh+1);
  // Percentage — white, bold, right-aligned inside bar
  ctx.fillStyle='#ffffff'; ctx.font='bold 8px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText(Math.round(gs.burnout)+'%', bx+bw/2, by+bh-2);

  ctx.textAlign='left';
}

// ── Title ─────────────────────────────────────────────────────────────────────
function drawTitle() {
  // Dark base
  ctx.fillStyle = '#060402';
  ctx.fillRect(0, 0, W, H);

  // Character-at-desk image fills the lower portion, full opacity
  const titleImg = imgs['title'];
  if (titleImg && titleImg.complete && titleImg.naturalWidth && titleImg.naturalHeight) {
    const ih = H * 0.6;
    const iw = ih * titleImg.naturalWidth / titleImg.naturalHeight;
    ctx.drawImage(titleImg, rr(W/2 - iw/2), rr(H - ih), rr(iw), rr(ih));
  }

  // Vignette: fade edges into dark
  const vTop = ctx.createLinearGradient(0, H*0.28, 0, H*0.52);
  vTop.addColorStop(0, 'rgba(6,4,2,1)'); vTop.addColorStop(1, 'rgba(6,4,2,0)');
  ctx.fillStyle = vTop; ctx.fillRect(0, 0, W, H*0.52);

  const vBot = ctx.createLinearGradient(0, H*0.9, 0, H);
  vBot.addColorStop(0, 'rgba(6,4,2,0)'); vBot.addColorStop(1, 'rgba(6,4,2,1)');
  ctx.fillStyle = vBot; ctx.fillRect(0, H*0.9, W, H*0.1);

  const vL = ctx.createLinearGradient(0, 0, W*0.15, 0);
  vL.addColorStop(0, 'rgba(6,4,2,0.9)'); vL.addColorStop(1, 'rgba(6,4,2,0)');
  ctx.fillStyle = vL; ctx.fillRect(0, 0, W*0.15, H);

  const vR = ctx.createLinearGradient(W*0.85, 0, W, 0);
  vR.addColorStop(0, 'rgba(6,4,2,0)'); vR.addColorStop(1, 'rgba(6,4,2,0.9)');
  ctx.fillStyle = vR; ctx.fillRect(W*0.85, 0, W*0.15, H);

  // All text lives in the dark upper strip, above where the image becomes visible
  ctx.textAlign = 'center';

  ctx.fillStyle = '#5a0a06'; ctx.font = 'bold 40px "Press Start 2P"';
  ctx.fillText('QAPI', W/2+3, 88);
  ctx.fillStyle = P.uiRed;
  ctx.fillText('QAPI', W/2, 85);

  ctx.fillStyle = P.uiDim; ctx.font = '7px "Press Start 2P"';
  ctx.fillText('THE UNWINNABLE GAME OF MANUAL QA', W/2, 106);

  ctx.fillStyle = '#c8b870'; ctx.font = '8px "Press Start 2P"';
  ctx.fillText('Catch the violations to ensure documentation', W/2, 148);
  ctx.fillText('and AI scribes meet QA standards.', W/2, 164);

  ctx.fillStyle = gs.frame%60<40 ? P.uiGold : P.uiDim;
  ctx.font = 'bold 10px "Press Start 2P"';
  ctx.fillText('PRESS ENTER TO START', W/2, 198);

  ctx.fillStyle = P.uiDim; ctx.font = '9px "Press Start 2P"';
  ctx.fillText('NO WINNING, ONLY SURVIVAL...', W/2, H*0.93);
  ctx.textAlign = 'left';
}

// ── Game Over ─────────────────────────────────────────────────────────────────
function drawGameOver() {
  ctx.fillStyle = '#060402';
  ctx.fillRect(0, 0, W, H);

  // Video — scale to full canvas width, positioned just below the text block
  if (goVideo.readyState >= 2) {
    const vW = W;
    const vH = vW * goVideo.videoHeight / goVideo.videoWidth;
    ctx.drawImage(goVideo, 0, rr(H*0.37), vW, rr(vH));
  }

  // Vignette — fade all four edges into the dark background
  const vTop = ctx.createLinearGradient(0, H*0.34, 0, H*0.50);
  vTop.addColorStop(0, 'rgba(6,4,2,1)'); vTop.addColorStop(1, 'rgba(6,4,2,0)');
  ctx.fillStyle = vTop; ctx.fillRect(0, 0, W, H*0.50);

  const vBot = ctx.createLinearGradient(0, H*0.66, 0, H*0.77);
  vBot.addColorStop(0, 'rgba(6,4,2,0)'); vBot.addColorStop(1, 'rgba(6,4,2,1)');
  ctx.fillStyle = vBot; ctx.fillRect(0, H*0.66, W, H*0.34);

  // Left — wider, fully opaque to cover the hard edge
  const vL = ctx.createLinearGradient(0, 0, W*0.30, 0);
  vL.addColorStop(0,    'rgba(6,4,2,1)');
  vL.addColorStop(0.55, 'rgba(6,4,2,0.7)');
  vL.addColorStop(1,    'rgba(6,4,2,0)');
  ctx.fillStyle = vL; ctx.fillRect(0, 0, W*0.30, H);

  const vR = ctx.createLinearGradient(W*0.82, 0, W, 0);
  vR.addColorStop(0, 'rgba(6,4,2,0)'); vR.addColorStop(1, 'rgba(6,4,2,0.9)');
  ctx.fillStyle = vR; ctx.fillRect(W*0.82, 0, W*0.18, H);

  // Score → weeks (1 week per ~300 pts, minimum 1)
  const weeks = Math.max(1, Math.floor(gs.score / 300) + (gs.score > 0 ? 1 : 0));

  // Text
  ctx.textAlign = 'center';
  ctx.fillStyle = '#6a1008'; ctx.font = 'bold 18px "Press Start 2P"';
  ctx.fillText('AUDIT TRIGGERED', W/2+2, 52);
  ctx.fillStyle = P.uiRed;
  ctx.fillText('AUDIT TRIGGERED', W/2, 50);

  ctx.fillStyle = P.uiText; ctx.font = '8px "Press Start 2P"';
  ctx.fillText('The regulators have arrived.', W/2, 88);
  ctx.fillText('Your violations are on record.', W/2, 106);

  ctx.fillStyle = P.uiGold; ctx.font = 'bold 11px "Press Start 2P"';
  ctx.fillText('YOU LASTED ' + weeks + ' WEEK' + (weeks === 1 ? '' : 'S'), W/2, 148);

  ctx.fillStyle = gs.frame%60<40 ? P.uiGold : P.uiDim;
  ctx.font = 'bold 8px "Press Start 2P"';
  ctx.fillText('PRESS ENTER TO TRY AGAIN', W/2, 186);
  ctx.textAlign = 'left';
}

// ── Main draw ─────────────────────────────────────────────────────────────────
function draw() {
  if (gs.phase === 'title')    { drawTitle();   return; }
  if (gs.phase === 'gameover') { drawGameOver(); return; }
  drawBg();
  for (const e of enemies) {
    if (e.dead) continue;
    if (e.type==='paper') drawPaper(e.x,e.y,e.w,e.h,gs.frame,e.hitFlash);
    else if (e.type==='clipboard') drawClipboard(e.x,e.y,e.w,e.h,gs.frame,e.hitFlash);
    else drawBot(e.x,e.y,e.w,e.h,gs.frame,e.hitFlash);
  }
  drawBullets();
  ctx.globalAlpha=1;
  for (const p of particles) {
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.color;
    ctx.fillRect(rr(p.x-p.size/2),rr(p.y-p.size/2),rr(p.size),rr(p.size));
  }
  ctx.globalAlpha=1;
  drawPlayer(player.x, player.y+PHALF, player.firing);
  drawForeground();
  drawUI();
}

// ── Loop ──────────────────────────────────────────────────────────────────────
let lastT=0;
function loop(t) {
  if (t-lastT>=14) { lastT=t; update(); draw(); if(gs.phase!=='playing') gs.frame++; }
  requestAnimationFrame(loop);
}

// ── Init ──────────────────────────────────────────────────────────────────────
gs = makeGs();
player = makePlayer();
bullets = []; enemies = []; particles = [];
platform = Array(PLAT_SEGS).fill(true);
requestAnimationFrame(loop);
</script>
